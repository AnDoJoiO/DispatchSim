name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint
        run: pip install ruff && ruff check app/

      # If pip-audit finds vulnerabilities you need to temporarily bypass,
      # add: --ignore-vuln PYSEC-XXXX-YYYY (one per known vuln)
      - name: Dependency audit
        run: pip install pip-audit && pip-audit

      - name: Run backend tests
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-with-at-least-32-chars!!
          DEBUG: 'false'
          ANTHROPIC_API_KEY: test-key
          DispatchSimKeyOpenAI: test-key

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # If npm audit finds vulnerabilities you need to temporarily bypass,
      # review them with: npm audit --audit-level=high and fix or override individually
      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Run frontend tests
        run: npm test

      - name: Build
        run: npm run build
